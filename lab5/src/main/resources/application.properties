# ===================================================================
# CAU HINH KET NOI CSDL (DataSource) - tro toi MySQL 8 chay bang Docker
# container: gdu-mysql | user: root | pass: root | db: gdu_jpa_lab
# ===================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/gdu_jpa_lab?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Ho_Chi_Minh
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================================
# CAU HINH JPA / HIBERNATE
# ===================================================================
# Hien thi cau lenh SQL Hibernate sinh ra tren console
spring.jpa.show-sql=true
# Dinh dang SQL cho de doc
spring.jpa.properties.hibernate.format_sql=true
# Spring Boot 3.x + Hibernate 6 tu dong nhan dien MySQL dialect -> khong can khai bao thu cong.
# Che do tu dong sinh/cap nhat bang tu Entity (chi dung cho Development)
spring.jpa.hibernate.ddl-auto=update
