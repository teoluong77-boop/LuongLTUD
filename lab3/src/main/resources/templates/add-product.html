<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Thêm sản phẩm</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <h1>Thêm sản phẩm</h1>

    <form th:action="@{/products/add}" th:object="${product}" method="post">
        <div class="form-group">
            <label>Tên sản phẩm:</label>
            <input type="text" th:field="*{name}">
            <span class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
        </div>

        <div class="form-group">
            <label>Giá:</label>
            <input type="number" step="any" th:field="*{price}">
            <span class="error" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></span>
        </div>

        <button class="btn" type="submit">Lưu</button>
        <a class="btn btn-secondary" th:href="@{/products}">Quay lại</a>
    </form>
</div>
</body>
</html>
