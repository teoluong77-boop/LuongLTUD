<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chi tiết sản phẩm</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <h1>Chi tiết sản phẩm</h1>

    <div class="detail" th:if="${product != null}">
        <p>ID: <span th:text="${product.id}"></span></p>
        <p>Tên: <span th:text="${product.name}"></span></p>
        <!-- Bài tập mở rộng (3): format giá tiền theo VNĐ -->
        <p>Giá: <span th:text="|${#numbers.formatInteger(product.price, 1, 'POINT')} ₫|"></span></p>
    </div>

    <div th:if="${product == null}">
        <p class="muted">Không tìm thấy sản phẩm.</p>
    </div>

    <p><a class="btn btn-secondary" th:href="@{/products}">Quay lại</a></p>
</div>
</body>
</html>
